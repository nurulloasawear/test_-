steps:
  - name: Checkout code
    uses: actions/checkout@v3

  - name: Deploy to EC2 via SSH
    uses: appleboy/ssh-action@master
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ubuntu
      key: ${{ secrets.EC2_KEY }}
      script: |
        echo "📦 Updating system..."
        sudo apt update -y
        sudo apt install -y python3-pip python3-venv git tmux

        echo "📁 Cloning or updating repo..."
        cd ~
        if [ -d "test_-" ]; then
          cd test_- && git pull
        else
          git clone https://github.com/nurulloasawear/test_-.git
          cd test_-
        fi

        echo "⚙️ Setting up virtual environment..."
        python3 -m venv venv
        source venv/bin/activate

        echo "🐍 Installing requirements..."
        pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        fi

        echo "🚀 Restarting backend server with tmux..."
        tmux kill-session -t backend || true
        tmux new-session -d -s backend "cd ~/test_- && source venv/bin/activate && python manage.py runserver 0.0.0.0:8000"

        echo "🌐 Restarting frontend server with tmux..."
        tmux kill-session -t frontend || true
        tmux new-session -d -s frontend "cd ~/test_-/frontend && python3 -m http.server 5500"

        echo "✅ Deployment complete."
