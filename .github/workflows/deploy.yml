steps:
  - name: Checkout code
    uses: actions/checkout@v3

  - name: Deploy to EC2 via SSH
    uses: appleboy/ssh-action@master
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ubuntu
      key: ${{ secrets.EC2_KEY }}
      script: |
        echo "🔄 Updating system..."
        sudo apt update -y
        sudo apt install -y python3-pip python3-venv

        echo "📁 Cloning repo or pulling latest changes..."
        cd ~
        if [ -d "test_-" ]; then
          cd test_- && git pull
        else
          git clone https://github.com/nurulloasawear/test_-.git
          cd test_-
        fi

        echo "🐍 Setting up virtual environment..."
        python3 -m venv venv
        source venv/bin/activate

        echo "📦 Installing requirements..."
        pip install --upgrade pip
        pip install -r requirements.txt || true

        echo "💥 Killing previous backend if running..."
        pkill -f "manage.py runserver" || true

        echo "🚀 Starting backend..."
        nohup venv/bin/python manage.py runserver 0.0.0.0:8000 > backend.log 2>&1 &

        echo "💥 Killing previous frontend if running..."
        pkill -f "http.server" || true

        echo "🌐 Starting frontend..."
        cd frontend
        nohup python3 -m http.server 5500 > frontend.log 2>&1 &

        echo "✅ Deployment complete."
